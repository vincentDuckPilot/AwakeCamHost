<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AwakeCam™</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="help.css">
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <section class="dashboard bg-light position-sticky top-0 w-100" style="z-index: 1030;">
        <div class="container">
            <div class="row bs5-grid-row">
                <div class="col-lg-1 col-md-3 col-sm-2 col-2" id="logo" onclick="location.href='intro.html'">
                    <img src="raspberry-pi-logo.png" alt="Logo" width="25" height="25">
                </div>
                <div class="col-lg-8 offset=3 col-md-3 col-sm-4 col-4" id="title" onclick="location.href='intro.html'">
                    Awake Cam
                </div>
                <div class="col-lg-1 col-md-2 col-sm-2 col-2" id="contact" onclick="location.href='contact.html'">Contact</div>
                <div class="col-lg-1 col-md-2 col-sm-2 col-2" id="login" onclick="location.href='login_page.html'">Log in</div>
                <div class="col-lg-1 col-md-2 col-sm-2 col-2" id="register" onclick="location.href='register.html'">Sign in</div>
            </div>
        </div>
    </section>

    <section class="main page">
        <h3 class="text-center fw-bold">Control Panel:</h3>


        <h5 class="text-center">Real Time Monitoring:</h5>
        <div class="text-center my-3">
            <img src="http://192.168.215.61:5000/video_feed" width="640" height="480" alt="Live Stream" style="border:2px solid #000; border-radius:10px;">
        </div>

        <section class="map-section text-center">
            <h3>Driver's Location:</h3>
            <div id="map"></div>
            <p id="location-info"></p>
            <h6>Not implemented as implementing gps API costs real money</h6>
        </section>

        <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"></script>
        <script src="main.js"></script>
    </section>

    <!-- Help -->
    <div class="help-icon" onclick="location.href='FAQ.html'">?</div>

</body>
</html>
